      alt: "Cityscape | Kolkata"
    - src: "https://res.cloudinary.com/dwcvdyc2w/image/upload/f_auto,q_auto/Photo_02_grzalg.jpg"
      alt: "What life is all about"
    - src: "https://res.cloudinary.com/dwcvdyc2w/image/upload/f_auto,q_auto/Photo_17_itpsly.jpg"
      alt: "Rides"
    - src: "https://res.cloudinary.com/dwcvdyc2w/image/upload/f_auto,q_auto/Photo_55_oqvvpn.jpg"
      alt: "Landscape | Bhutan"
    - src: "https://res.cloudinary.com/dwcvdyc2w/image/upload/f_auto,q_auto/Photo_47_mctvyp.jpg"
      alt: "Journey for life"
    - src: "https://res.cloudinary.com/dwcvdyc2w/image/upload/f_auto,q_auto/Photo_60_nz5ior.jpg"
      alt: "Pattern"
    - src: "https://res.cloudinary.com/dwcvdyc2w/image/upload/f_auto,q_auto/Photo_59_doyeki.jpg"
      alt: "Don't worry, be happy"
      
